server {
    listen 80;
    server_name credix.app.br www.credix.app.br app.credix.app.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name credix.app.br www.credix.app.br app.credix.app.br;

    ssl_certificate /etc/letsencrypt/live/credix.app.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/credix.app.br/privkey.pem;

    client_max_body_size 10m;
    resolver 127.0.0.11 ipv6=off valid=5s;

    location /app {
        set $frontend_upstream frontend;
        proxy_pass http://$frontend_upstream:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        set $backend_upstream backend;
        proxy_pass http://$backend_upstream:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
