services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: credix_v2_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 4000
    ports:
      - "${DOCKER_API_PUBLIC_PORT:-4100}:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4100}
    container_name: credix_v2_web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      API_INTERNAL_BASE_URL: http://api:4000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4100}
    ports:
      - "${DOCKER_WEB_PUBLIC_PORT:-3100}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/app >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
