services:
  db:
    image: postgres:16-alpine
    container_name: credfacil_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: credfacil_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${PORT:-4000}
      APP_BASE_URL: ${APP_BASE_URL:-}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      SESSION_IDLE_MINUTES: ${SESSION_IDLE_MINUTES:-30}
      COOKIE_NAME: ${COOKIE_NAME}
      COOKIE_SECURE: ${COOKIE_SECURE}
      WHATSAPP_GRAPH_BASE_URL: ${WHATSAPP_GRAPH_BASE_URL:-https://graph.facebook.com}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION:-v22.0}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      PIX_KEY: ${PIX_KEY:-}
      PAYMENT_LINK: ${PAYMENT_LINK:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      EMAIL_NOTIFY_ENABLED: ${EMAIL_NOTIFY_ENABLED:-false}
      EMAIL_NOTIFY_TO: ${EMAIL_NOTIFY_TO:-}
      EMAIL_NOTIFY_TZ: ${EMAIL_NOTIFY_TZ:-America/Sao_Paulo}
      EMAIL_NOTIFY_TIME: ${EMAIL_NOTIFY_TIME:-08:00}
      EMAIL_NOTIFY_RUN_ON_START: ${EMAIL_NOTIFY_RUN_ON_START:-false}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
    ports:
      - "127.0.0.1:${PORT:-4000}:${PORT:-4000}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-4000}/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: credfacil_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/app >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: novapasta_postgres_data
